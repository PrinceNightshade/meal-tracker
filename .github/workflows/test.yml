name: Test and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate code syntax and structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check JavaScript syntax
        run: |
          echo "Checking JavaScript syntax..."
          for file in js/*.js; do
            if [[ -f "$file" ]]; then
              echo "Validating $file..."
              node -c "$file" 2>&1 || exit 1
            fi
          done
          echo "✓ All JavaScript files have valid syntax"

      - name: Validate Service Worker
        run: |
          echo "Checking Service Worker..."
          if ! grep -q "self.addEventListener.*install" sw.js; then
            echo "❌ Service Worker missing install event"
            exit 1
          fi
          if ! grep -q "self.addEventListener.*activate" sw.js; then
            echo "❌ Service Worker missing activate event"
            exit 1
          fi
          if ! grep -q "const CACHE = " sw.js; then
            echo "❌ Service Worker missing CACHE version"
            exit 1
          fi
          echo "✓ Service Worker structure valid"

      - name: Check for debug artifacts
        run: |
          echo "Checking for debug code..."
          if grep -r "console\.log\|console\.error\|debugger" js/*.js 2>/dev/null | grep -v "^ *//"; then
            echo "⚠️  Found console statements - consider removing before merge"
          fi
          echo "✓ Debug artifact check complete"

  test:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      issues: write
    outputs:
      test_output: ${{ steps.run_tests.outputs.test_output }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run tests
        id: run_tests
        run: |
          set +e
          output=$(node --test tests/*.test.js 2>&1)
          exit_code=$?
          echo "test_output<<EOF" >> $GITHUB_OUTPUT
          echo "$output" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "$output"
          exit $exit_code

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.run_tests.outputs.test_output }}`;
            const sha = context.sha.slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 Test failure on ${sha}`,
              labels: ['test-failure'],
              body: [
                `**Commit:** ${context.sha}`,
                `**Run:** ${runUrl}`,
                `**Branch:** ${context.ref}`,
                ``,
                `## Failure output`,
                `\`\`\``,
                output,
                `\`\`\``,
              ].join('\n'),
            });

  deploy:
    name: Deploy to GitHub Pages
    needs: [test, validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4

      - name: Prepare deploy artifacts
        run: |
          # Auto-generate SW cache version from git SHA (no manual version bumps)
          sed -i "s/const CACHE = 'meal-tracker-v[0-9]*'/const CACHE = 'meal-tracker-$(git rev-parse --short HEAD)'/" sw.js

          # Copy only web files to dist/, excluding dev/CI artifacts
          mkdir -p dist
          cp -r js css icons dist/
          cp index.html manifest.json sw.js dist/
          touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'
      - uses: actions/deploy-pages@v4
        id: deploy

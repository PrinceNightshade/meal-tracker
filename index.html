<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#C8FF3D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Meals">
  <title>Meal Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="js/pulse-theme.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<!-- Pulse icon sprite -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <!-- bottom nav -->
    <symbol id="i-daily" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 4h16v16H4z"/><path d="M4 9h16M9 4v5"/>
    </symbol>
    <symbol id="i-weight" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 8h14l1 13H4L5 8z"/><path d="M9 8a3 3 0 0 1 6 0"/>
    </symbol>
    <symbol id="i-goals" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/>
    </symbol>

    <!-- meal section icons -->
    <symbol id="i-meal-breakfast" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4L7 17M17 7l1.4-1.4"/>
    </symbol>
    <symbol id="i-meal-lunch" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12h18M5 12v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6"/><path d="M8 12V8M16 12V8"/>
    </symbol>
    <symbol id="i-meal-dinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
    </symbol>
    <symbol id="i-meal-snacks" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
      <circle cx="12" cy="12" r="8"/>
    </symbol>

    <!-- chrome -->
    <symbol id="i-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <path d="M12 5v14M5 12h14"/>
    </symbol>
    <symbol id="i-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M18 6L6 18M6 6l12 12"/>
    </symbol>
    <symbol id="i-star" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round">
      <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
    </symbol>
    <symbol id="i-star-fill" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
    </symbol>
    <symbol id="i-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
    </symbol>
    <symbol id="i-camera" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round">
      <path d="M3 7h4l2-3h6l2 3h4v12H3z"/><circle cx="12" cy="13" r="4"/>
    </symbol>
    <symbol id="i-scan" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 7V4h3M21 7V4h-3M3 17v3h3M21 17v3h-3M7 8v8M11 8v8M15 8v8"/>
    </symbol>
    <symbol id="i-bolt" viewBox="0 0 24 24" fill="currentColor">
      <path d="M13 2L4 14h7v8l9-12h-7V2z"/>
    </symbol>
    <symbol id="i-water" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round">
      <path d="M12 3s7 8 7 13a7 7 0 0 1-14 0c0-5 7-13 7-13z"/>
    </symbol>
    <symbol id="i-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <path d="M5 12h14M13 6l6 6-6 6"/>
    </symbol>
    <symbol id="i-trend-up" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M7 17l5-5 5 5M7 11l5-5 5 5"/>
    </symbol>
    <symbol id="i-trend-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M7 7l5 5 5-5M7 13l5 5 5-5"/>
    </symbol>
    <symbol id="i-chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18l6-6-6-6"/>
    </symbol>
  </defs>
</svg>

  <div class="app">
    <!-- Date Navigation -->
    <div class="date-nav">
      <div class="date-nav__left">
        <div>
          <div class="date-nav__eyebrow" id="date-eyebrow">TODAY</div>
          <div class="date-nav__title" id="date-display"></div>
        </div>
      </div>
      <div class="date-nav__right">
        <button id="btn-today" class="date-nav__streak hidden">TODAY</button>
        <span class="date-nav__streak hidden" id="streak-pill">STREAK <b>0</b></span>
        <button id="btn-profile" class="btn-profile" aria-label="Profile menu"></button>
      </div>
    </div>

    <!-- Main Content -->
    <div id="view-content"></div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-daily">
      <span class="nav-icon"><svg width="16" height="16"><use href="#i-daily"/></svg></span>
      <span class="nav-label">Daily</span>
    </button>
    <button class="nav-btn" id="nav-weight">
      <span class="nav-icon"><svg width="16" height="16"><use href="#i-weight"/></svg></span>
      <span class="nav-label">Weight</span>
    </button>
    <button class="nav-btn" id="nav-goals">
      <span class="nav-icon"><svg width="16" height="16"><use href="#i-goals"/></svg></span>
      <span class="nav-label">Goals</span>
    </button>
  </nav>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-grabber"></div>
      <button id="modal-close" aria-label="Close">
        <svg width="16" height="16"><use href="#i-close"/></svg>
      </button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Update Banner -->
  <div id="update-banner">
    <span>Update available</span>
    <button id="update-banner-btn">Reload</button>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>

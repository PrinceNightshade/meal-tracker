<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#5b1a8a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Meals">
  <title>Meal Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
  <script>
    // Apply saved theme before paint to avoid flash
    const t = localStorage.getItem('mt_theme');
    if (t) document.documentElement.classList.add(t);
  </script>
</head>
<body>
  <div class="app">
    <!-- Date Navigation -->
    <div class="date-nav">
      <button id="btn-prev" title="Previous day">&#8249;</button>
      <span id="date-display"></span>
      <button id="btn-next" title="Next day">&#8250;</button>
      <button id="btn-today">Today</button>
    </div>

    <!-- Main Content -->
    <div id="view-content"></div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-daily">
      <span class="nav-icon">&#x1F4CB;</span>
      <span>Daily</span>
    </button>
    <button class="nav-btn" id="nav-weight">
      <span class="nav-icon">&#x2696;&#xFE0F;</span>
      <span>Weight</span>
    </button>
    <button class="nav-btn" id="nav-goals">
      <span class="nav-icon">&#x1F3AF;</span>
      <span>Goals</span>
    </button>
  </nav>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <button id="modal-close">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/meal-tracker/sw.js', { updateViaCache: 'none' })
        .then(reg => reg.update());
    }
  </script>
</body>
</html>
